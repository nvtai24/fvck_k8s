apiVersion: v1
kind: Pod
metadata:
  name: init-pod
  namespace: lab01
  labels:
    app: init-demo
spec:
  volumes:
    - name: workdir
      emptyDir: {}

  # TODO: add an initContainers section here
  # The init container should:
  #   - be named "setup"
  #   - use image busybox:1.36
  #   - run a command that writes "<h1>Initialized!</h1>" to /workdir/index.html
  #   - mount the "workdir" volume at /workdir
  initContainers: [] # Replace [] with your init container definition

  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: workdir
          mountPath: # TODO: where should nginx serve files from?
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

  restartPolicy: Always
