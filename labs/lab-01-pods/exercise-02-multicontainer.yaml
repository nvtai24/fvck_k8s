apiVersion: v1
kind: Pod
metadata:
  name: sidecar-pod
  namespace: lab01
  labels:
    app: sidecar-demo
spec:
  volumes:
    - name: # TODO: name the shared volume "shared-data"
      emptyDir: {}

  containers:
    # --- Container 1: writer (sidecar) ---
    - name: writer
      image: # TODO: use busybox:1.36
      command:
        - sh
        - -c
        - # TODO: write a loop that runs forever:
          #        - echo current date + some HTML into /shared/index.html
          #        - sleep 5
          # Hint: while true; do echo "..." > /shared/index.html; sleep 5; done
      volumeMounts:
        - name: # TODO: reference the shared volume name
          mountPath: # TODO: mount at /shared

    # --- Container 2: reader (nginx) ---
    - name: reader
      image: # TODO: use nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: # TODO: reference the shared volume name
          mountPath: # TODO: mount at /usr/share/nginx/html
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
