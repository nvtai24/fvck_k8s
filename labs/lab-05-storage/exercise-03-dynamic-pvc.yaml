---
# Exercise 3: Dynamic Provisioning
# Create a PVC using the default StorageClass (no manual PV needed)

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamic-pvc
  namespace: lab05
spec:
  accessModes:
    - ReadWriteOnce
  # TODO: either remove storageClassName entirely (uses cluster default)
  # OR set it to the default StorageClass name shown in "kubectl get storageclass"
  # storageClassName: standard
  resources:
    requests:
      storage: # TODO: "256Mi"

---
apiVersion: v1
kind: Pod
metadata:
  name: dynamic-pvc-pod
  namespace: lab05
spec:
  volumes:
    - name: dynamic-storage
      persistentVolumeClaim:
        claimName: # TODO: "dynamic-pvc"
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: dynamic-storage
          mountPath: /data
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
