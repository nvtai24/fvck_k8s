---
# Exercise 1: Static PV + PVC + Pod
# TODO: fill in all fields marked with # TODO

# 1. PersistentVolume (cluster-scoped, no namespace)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lab05-pv
  labels:
    type: local
spec:
  capacity:
    storage: # TODO: "1Gi"
  accessModes:
    - # TODO: ReadWriteOnce
  persistentVolumeReclaimPolicy: # TODO: Retain
  storageClassName: # TODO: "manual"
  hostPath:
    path: # TODO: "/tmp/lab05-pv"
    type: DirectoryOrCreate

---
# 2. PersistentVolumeClaim (namespace-scoped)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lab05-pvc
  namespace: lab05
spec:
  accessModes:
    - # TODO: ReadWriteOnce
  storageClassName: # TODO: "manual"  (must match the PV)
  resources:
    requests:
      storage: # TODO: "500Mi"

---
# 3. Pod using the PVC
apiVersion: v1
kind: Pod
metadata:
  name: pv-pod
  namespace: lab05
spec:
  volumes:
    - name: pv-storage
      persistentVolumeClaim:
        claimName: # TODO: "lab05-pvc"

  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: pv-storage
          mountPath: # TODO: "/data"
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Always
