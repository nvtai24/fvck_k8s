---
# SOLUTION 1: nodeSelector
apiVersion: v1
kind: Pod
metadata:
  name: nodeselector-pod
  namespace: lab08
spec:
  nodeSelector:
    disktype: ssd
  containers:
    - name: nginx
      image: nginx:1.25
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

---
# SOLUTION 2: Node Affinity
apiVersion: v1
kind: Pod
metadata:
  name: affinity-pod
  namespace: lab08
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: region
                operator: In
                values:
                  - us-east
  containers:
    - name: nginx
      image: nginx:1.25
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

---
# SOLUTION 3: Pod Anti-Affinity
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread-deploy
  namespace: lab08
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spread-app
  template:
    metadata:
      labels:
        app: spread-app
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: spread-app
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.25
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
# SOLUTION 4: Toleration
apiVersion: v1
kind: Pod
metadata:
  name: toleration-pod
  namespace: lab08
spec:
  tolerations:
    - key: "dedicated"
      operator: Equal
      value: "lab"
      effect: NoSchedule
  containers:
    - name: nginx
      image: nginx:1.25
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
