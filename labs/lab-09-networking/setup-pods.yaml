# Pre-built setup for Lab 09 — deploys 3 pods (frontend, backend, database) + their services
# All pods run nginx for simplicity (just testing connectivity)

---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-pod
  namespace: lab09
  labels:
    app: frontend
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: lab09
spec:
  selector:
    app: frontend
  ports:
    - port: 80

---
apiVersion: v1
