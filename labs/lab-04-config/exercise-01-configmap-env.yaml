---
# Exercise 1: ConfigMap as Environment Variables
# TODO: fill in all fields marked with # TODO

# 1. ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: lab04
data:
  APP_ENV: # TODO: "production"
  APP_PORT: # TODO: "8080"
  LOG_LEVEL: # TODO: "info"

---
# 2. Pod that injects ALL configmap keys as env vars
apiVersion: v1
kind: Pod
metadata:
  name: configmap-pod
  namespace: lab04
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      # TODO: inject all keys from "app-config" as environment variables
      # Hint: use envFrom + configMapRef
      envFrom: []   # Replace this with the correct envFrom definition
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Always
