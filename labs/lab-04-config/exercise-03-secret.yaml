---
# Exercise 3: Secrets — create and consume

# 1. Secret (use stringData so you don't need to base64 manually)
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: lab04
type: Opaque
stringData:
  username: # TODO: "admin"
  password: # TODO: "S3cr3tP@ss!"

---
# 2. Pod that consumes the secret
apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
  namespace: lab04
spec:
  volumes:
    - name: secret-volume
      secret:
        secretName: # TODO: "db-secret"
        defaultMode: 0400   # read-only by owner

  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]

      env:
        # TODO: inject "username" key from db-secret as DB_USER
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: # TODO: "db-secret"
              key: # TODO: "username"

        # TODO: inject "password" key from db-secret as DB_PASS
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: # TODO: "db-secret"
              key: # TODO: "password"

      # TODO: mount the secret-volume at /etc/secrets
      volumeMounts:
        - name: secret-volume
          mountPath: # TODO: "/etc/secrets"
          readOnly: true

      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
