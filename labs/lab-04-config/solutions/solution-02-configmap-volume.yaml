---
# SOLUTION 2: ConfigMap as Mounted Files
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: lab04
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        location / {
            return 200 "Hello from ConfigMap nginx!\n";
            add_header Content-Type text/plain;
        }
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-vol-pod
  namespace: lab04
spec:
  volumes:
    - name: nginx-conf-volume
      configMap:
        name: nginx-config
        items:
          - key: nginx.conf
            path: default.conf
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-conf-volume
          mountPath: /etc/nginx/conf.d
          readOnly: true
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
