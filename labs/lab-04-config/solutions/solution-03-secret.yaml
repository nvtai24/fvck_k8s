---
# SOLUTION 3: Secrets
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: lab04
type: Opaque
stringData:
  username: "admin"
  password: "S3cr3tP@ss!"

---
apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
  namespace: lab04
spec:
  volumes:
    - name: secret-volume
      secret:
        secretName: db-secret
        defaultMode: 0400
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
