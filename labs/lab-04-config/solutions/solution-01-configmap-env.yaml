---
# SOLUTION 1: ConfigMap as Environment Variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: lab04
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-pod
  namespace: lab04
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      envFrom:
        - configMapRef:
            name: app-config
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Always
