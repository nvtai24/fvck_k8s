# This file is already complete — just apply it and use it to test DNS discovery

---
# Server pod + service
apiVersion: v1
kind: Pod
metadata:
  name: server-pod
  namespace: lab03
  labels:
    app: server
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
  namespace: lab03
spec:
  selector:
    app: server
  ports:
    - port: 80
      targetPort: 80

---
# Client pod — use this to test DNS and connectivity
apiVersion: v1
kind: Pod
metadata:
  name: client-pod
  namespace: lab03
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
