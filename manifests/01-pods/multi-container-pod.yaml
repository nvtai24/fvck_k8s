# ============================================================
# Multi-Container Pod (Sidecar Pattern)
# - Main container: nginx serving static files
# - Sidecar container: content sync (simulated with busybox)
# - Shared emptyDir volume between containers
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: default
  labels:
    app: multi-container-demo
spec:
  volumes:
    # Shared volume between all containers in this pod
    - name: shared-content
      emptyDir: {}

  containers:
    # --- Main Container: nginx ---
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-content
          mountPath: /usr/share/nginx/html
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10

    # --- Sidecar Container: content writer ---
    # Simulates a content syncer that writes/updates html files
    - name: content-syncer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "<h1>Synced at $(date)</h1>" > /content/index.html
            echo "Content updated at $(date)"
            sleep 30
          done
      volumeMounts:
        - name: shared-content
          mountPath: /content
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

  restartPolicy: Always
