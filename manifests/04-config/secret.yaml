# ============================================================
# Secrets
# - Stores sensitive data: passwords, tokens, certs, keys
# - Values are base64 encoded (NOT encrypted by default)
# - Enable EncryptionConfiguration in kube-apiserver for encryption at rest
# - Consider using external secret managers in production:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + Vault Agent Injector
#
# Create base64: echo -n "mypassword" | base64
# Decode base64: echo "bXlwYXNzd29yZA==" | base64 -d
# ============================================================

---
# ============================================================
# 1. Opaque Secret (generic)
# - Type for arbitrary user-defined secrets
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: default
  labels:
    app: myapp
type: Opaque
data:
  # Values MUST be base64 encoded
  # echo -n "mypassword" | base64
  db_password: bXlwYXNzd29yZA==
  db_username: YWRtaW4=
  api_key: c2VjcmV0LWFwaS1rZXktaGVyZQ==

# Alternatively use stringData (plain text — K8s encodes it automatically)
# stringData:
#   db_password: "mypassword"    # Plain text, not base64
#   db_username: "admin"

---
# ============================================================
# 2. Docker Registry Secret
# - Used to pull images from private registries
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: default
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config-json>

# Create via kubectl (easier):
# kubectl create secret docker-registry docker-registry-secret \
#   --docker-server=registry.example.com \
#   --docker-username=myuser \
#   --docker-password=mypassword \
#   --docker-email=me@example.com

---
# ============================================================
# 3. TLS Secret
# - Stores TLS certificate and private key for Ingress or apps
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: <base64-encoded-certificate>
  tls.key: <base64-encoded-private-key>

# Create via kubectl:
# kubectl create secret tls tls-secret --cert=path/to/tls.crt --key=path/to/tls.key

---
# ============================================================
# 4. Using Secrets in a Pod
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  name: secret-demo-pod
  namespace: default
spec:
  volumes:
    # Mount secret as files in a volume
    - name: secret-volume
      secret:
        secretName: app-secret
        defaultMode: 0400   # Read-only by owner only (secure)

  # Use a private registry to pull the image
  imagePullSecrets:
    - name: docker-registry-secret

  containers:
    - name: app
      image: registry.example.com/myapp:v1.0

      # Option 1: Inject specific secret key as env var
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db_password
              optional: false    # Fail if secret/key doesn't exist

      # Option 2: Inject ALL keys in secret as env vars
      envFrom:
        - secretRef:
            name: app-secret

      # Option 3: Mount secret as files
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
      # Files available:
      # /etc/secrets/db_password
      # /etc/secrets/db_username
      # /etc/secrets/api_key

      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

# ============================================================
# Security Best Practices:
# - Never commit Secrets to git (use sealed-secrets or external managers)
# - Enable EncryptionConfiguration for secrets at rest
# - Use RBAC to restrict who can read secrets
# - Consider External Secrets Operator for production workloads
# ============================================================
