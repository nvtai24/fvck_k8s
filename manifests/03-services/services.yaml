# ============================================================
# Services — All Types Demo
#
# 1. ClusterIP  — internal only, default type
# 2. NodePort   — external via node IP and port
# 3. LoadBalancer — external via cloud load balancer
# 4. ExternalName — DNS alias to external service
# 5. Headless   — no virtual IP, DNS resolves to pod IPs
# ============================================================

---
# ============================================================
# 1. ClusterIP Service (Default)
# - Only accessible within the cluster
# - Gets a stable virtual IP (ClusterIP) within the cluster
# - Used for pod-to-pod communication
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
  namespace: default
  labels:
    app: nginx
spec:
  type: ClusterIP           # Default type (can be omitted)
  selector:
    app: nginx              # Routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80              # Port clients use to reach the service
      targetPort: 80        # Port the container listens on
                            # targetPort can also be a named port

---
# ============================================================
# 2. NodePort Service
# - Accessible externally via <NodeIP>:<NodePort>
# - NodePort range: 30000-32767
# - Also creates a ClusterIP internally
# - Use for dev/testing or when no cloud LB is available
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80              # ClusterIP port
      targetPort: 80        # Container port
      nodePort: 30080       # External node port (30000-32767)
                            # If omitted, Kubernetes assigns one randomly

---
# ============================================================
# 3. LoadBalancer Service
# - Provisions an external load balancer from cloud provider
# - Also creates NodePort and ClusterIP automatically
# - Requires cloud environment (AWS, GCP, Azure, etc.)
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
  namespace: default
  annotations:
    # AWS-specific annotations (example)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
  # Optionally request a specific load balancer IP (cloud-specific)
  # loadBalancerIP: "203.0.113.10"

  # Restrict source IP ranges (whitelist)
  loadBalancerSourceRanges:
    - "0.0.0.0/0"    # Allow all; restrict in production

---
# ============================================================
# 4. ExternalName Service
# - Maps a service to a DNS name (no proxying, just CNAME)
# - Use case: abstract external services (RDS, etc.) behind a
#   Kubernetes service name so pods can use internal DNS
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: external-db
  namespace: default
spec:
  type: ExternalName
  externalName: mydb.example-rds.us-east-1.rds.amazonaws.com
  # Pods in cluster can now use: external-db.default.svc.cluster.local
  # and it resolves to the external DNS name

---
# ============================================================
# 5. Headless Service
# - clusterIP: None
# - No virtual IP assigned; DNS returns pod IPs directly
# - REQUIRED for StatefulSets for stable network identities
# - Useful for peer discovery in distributed systems
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  namespace: default
spec:
  clusterIP: None     # Makes it headless
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80

# DNS resolution for headless service:
# nslookup nginx-headless.default.svc.cluster.local
# Returns: individual pod IPs (A records), not a single ClusterIP
