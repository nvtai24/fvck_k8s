# ============================================================
# DaemonSet
# - Ensures a copy of the pod runs on EVERY node (or selected nodes)
# - Common use cases:
#   - Log collectors (Fluentd, Filebeat)
#   - Node monitoring (Prometheus node exporter)
#   - Network plugins, storage plugins
#   - Security agents
# ============================================================

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-log-collector
  namespace: kube-system
  labels:
    app: log-collector
spec:
  selector:
    matchLabels:
      app: log-collector

  # Update strategy for DaemonSet
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # Max pods that can be unavailable during update

  template:
    metadata:
      labels:
        app: log-collector
    spec:
      # Allow scheduling on control-plane nodes (if needed)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2
          resources:
            requests:
              cpu: "50m"
              memory: "50Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"

          # Mount node log directories
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

          # Security context — need read access to host paths
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

      # Host volumes for accessing node logs
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

      # Run as root needed to read system logs
      # In production, use securityContext to minimize privileges
      serviceAccountName: log-collector-sa

      # Use host network namespace if needed for monitoring
      # hostNetwork: true
      # hostPID: true

# ============================================================
# To schedule on ONLY specific nodes, use nodeSelector:
#
# spec:
#   template:
#     spec:
#       nodeSelector:
#         kubernetes.io/os: linux
#         custom-label: log-enabled
# ============================================================
