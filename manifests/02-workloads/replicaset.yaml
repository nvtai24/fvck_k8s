# ============================================================
# ReplicaSet
# - Maintains a stable set of replica Pods
# - Note: Prefer Deployments over direct ReplicaSet usage
# - ReplicaSet does NOT support rolling updates on its own
# ============================================================

apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  namespace: default
  labels:
    app: nginx
spec:
  # Number of desired pod replicas
  replicas: 3

  # Selector must match pod template labels
  selector:
    matchLabels:
      app: nginx
      tier: frontend

  # Pod template
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
