# ============================================================
# HorizontalPodAutoscaler (HPA)
# - Automatically scales number of pod replicas based on metrics
# - Supports CPU, memory, and custom/external metrics
# - Requires Metrics Server to be installed
#
# Install Metrics Server:
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ============================================================

---
# ============================================================
# 1. HPA based on CPU utilization (basic, v2)
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa
  namespace: default
spec:
  # Target workload to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment

  # Replica bounds
  minReplicas: 2
  maxReplicas: 10

  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Target 70% CPU across all pods

    # Scale based on Memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: "200Mi"     # Target 200Mi memory per pod

  # Scaling behavior (K8s >= 1.18)
  behavior:
    scaleUp:
      # How aggressively to scale up
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 4                      # Add at most 4 pods per period
          periodSeconds: 60
        - type: Percent
          value: 100                    # Or double the count per period
          periodSeconds: 60
      selectPolicy: Max                 # Use whichever policy allows more pods

    scaleDown:
      # How conservatively to scale down (prevent thrashing)
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 2                      # Remove at most 2 pods per period
          periodSeconds: 60
      selectPolicy: Min                 # Use most conservative policy

---
# ============================================================
# 2. HPA with Custom Metrics (requires custom metrics adapter)
# - Example: scale based on requests-per-second
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa-custom
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-deployment

  minReplicas: 1
  maxReplicas: 20

  metrics:
    # Custom metric from Prometheus Adapter
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"    # Target 100 req/s per pod

    # External metric (e.g., SQS queue depth)
    - type: External
      external:
        metric:
          name: sqs_queue_depth
          selector:
            matchLabels:
              queue-name: "my-queue"
        target:
          type: AverageValue
          averageValue: "30"    # Target 30 messages per pod

# ============================================================
# Useful HPA Commands:
#
# kubectl get hpa
# kubectl describe hpa nginx-hpa
# kubectl top pods           # Requires metrics-server
# kubectl top nodes
#
# Watch HPA scale in real time:
# kubectl get hpa -w
#
# Simulate load to trigger scale-up:
# kubectl run load-gen --image=busybox -- sh -c "while true; do wget -q -O- http://nginx-clusterip/; done"
# ============================================================
